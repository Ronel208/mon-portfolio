<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        form {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        fieldset {
            border: 1px solid #d1d9e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }

        legend {
            font-weight: 600;
            font-size: 1rem;
            color: #2d6a4f;
            padding: 0 8px;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 4px;
            font-size: 0.9rem;
            color: #444;
            font-weight: 500;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.15);
        }

        /* Radio buttons */
        input[type="radio"] {
            accent-color: #2d6a4f;
            margin-right: 8px;
        }

        p {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #444;
            line-height: 2;
        }

        textarea {
            margin-top: 10px;
            resize: vertical;
        }

        /* Boutons */
        input[type="submit"],
        input[type="reset"] {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        input[type="submit"] {
            background-color: #2d6a4f;
            color: white;
            margin-right: 10px;
        }

        input[type="submit"]:hover {
            background-color: #a792f1;
        }

        input[type="reset"] {
            background-color: #e0e0e0;
            color: #333;
        }

        input[type="reset"]:hover {
            background-color: #c8c8c8;
        }
        .form-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <form method="post" action="cible_formulaire.php"> 
    
        <fieldset> 
            <legend>Vos coordonnées</legend> 
            
            <label for="nom">Quel est votre nom ?</label><br /> 
            <input type="text" name="nom" id="nom" tabindex="10" /><br /> 
            
            <label for="prenom">Quel est votre prénom ?</label><br /> 
            <input type="text" name="prenom" id="prenom" tabindex="20" /><br /> 
            
            <label for="email">Quel est votre e-mail ?</label><br /> 
            <input type="text" name="email" id="email" tabindex="30" /><br /> 
        </fieldset> 
        
        <fieldset> 
            <legend>Votre appréciation</legend> 
            
            <p> 
            Comment trouvez-vous notre projet ? :<br /> 
            <input type="radio" name="appréciation" value="excellent" id="excellent" tabindex="40" /> <label for="execellent">Excellent</label><br /> 
            <input type="radio" name="appréciation" value="bien " id="bien" tabindex="50" /> <label for="bien">Bien</label><br /> 
            <input type="radio" name="appréciation" value="moyen" id="moyen" tabindex="60" /> <label 
            for="moyen">Bien</label><br /> 
            <input type="radio" name="appréciation" value="à améloier" id="a améliorer" tabindex="70" /> <label 
            for="autre">A améliorer</label><br /> 
            </p> 
            <textarea name="precisions" id="precisions" cols="40" rows="4" tabindex="80"></textarea> 
            </p> 
        </fieldset> 
        <p> 
        <input type="submit" /> 
        <input type="reset" /> 
        </p>
        <div class="form-footer">
                Vos données restent privées et sécurisées.
            </div>
    </form>
    <div id="merci" style="display:none; text-align:center; padding:20px;">
        <h2>Merci pour votre soumission !</h2>
    </div>

    <script>
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();
        document.querySelector('form').style.display = 'none';
        document.getElementById('merci').style.display = 'block';
    });
    </script>
</body>
</html>
