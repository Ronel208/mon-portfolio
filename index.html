<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Mon site officiel</title>
  <link rel="stylesheet" href="Frame1.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      zoom: 0,5;
    }

    .conteneur {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: linear-gradient(135deg, #c0c1c9, #267fcd);
      color: white;
      padding: 30px 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .corps {
      display: flex;
      height: 1000%;
      padding: 12px 16px;
      margin-bottom: 10px;
      border-radius: 10px;
      background: #f0f2f8;
      color: #1a1f4d;
      text-decoration: none;
    }

    .menu {
      width: 20%;
    }

    .contenu {
      width: 80%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .entete {
      height: 20%;
      border-bottom: 4px solid #999;
    }

    .menu {
      width: 20%;
      border-right: 4px solid #999;
    }
    .pied-de-page p {
    margin: 1;
    }
  </style>
</head>
<body>
  <div class="conteneur">
    <div class="entete">
      <iframe src="Présentation.html" name="entete"></iframe>
    </div>
    <div class="corps">
      <div class="menu">
        <iframe src="B.html" name="menu"></iframe>
      </div>
      <div class="contenu">
        <iframe src="C.html" name="Zone de texte"></iframe>
      </div>
    </div>
  </div>
  <div class="pied-de-page">
    <p>© 2026 MAKIN Ronel — Université d'Abomey-Calavi | Tous droits réservés</p>
  </div>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script>
  document.querySelectorAll('.lien-menu').forEach(lien => {
    lien.addEventListener('click', function() {
      document.querySelectorAll('.lien-menu').forEach(l => l.classList.remove('actif'));
      this.classList.add('actif');
    });
  });
</script>
</body>
</html>
